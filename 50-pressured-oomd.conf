# 50-pressured-oomd.conf — installed to /etc/systemd/system/user@.service.d/
#
# Why this exists:
# Ubuntu ships /usr/lib/systemd/system/user@.service.d/10-oomd-user-service-defaults.conf
# with `ManagedOOMMemoryPressure=kill` and `ManagedOOMMemoryPressureLimit=50%`.
# That makes systemd-oomd SIGKILL the largest cgroup in the user slice as soon
# as PSI memory pressure sits above 50% for >10s with reclaim — which is the
# exact band pressured is designed to work in. When both run with the stock
# limit they race for the same victim and oomd wins — it can SIGKILL the
# compositor's own cgroup while pressured is still mid-mitigation, tearing down
# the whole desktop session, before the gentler freeze/throttle has had a chance.
#
# This drop-in raises oomd's kill threshold to 80%, ceding the 50–80% pressure
# band to pressured (freeze/zram/throttle) while keeping oomd as a hard
# last-resort backstop above 80% (plus the kernel OOM killer above that). It
# does NOT disable oomd — it just stops oomd from firing before pressured has
# had a chance to act.
#
# Fully reversible: delete this file and `systemctl daemon-reload`. Takes full
# effect for user sessions started after a daemon-reload (i.e. next login).
[Service]
ManagedOOMMemoryPressureLimit=80%
