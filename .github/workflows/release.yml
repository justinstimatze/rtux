name: Release

# Tag a release with:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --features hud

      - name: Package
        run: |
          V="${GITHUB_REF_NAME}"
          STAGE="rtux-${V}-x86_64-linux"
          mkdir -p "dist/$STAGE"
          cp target/release/pressured target/release/pressured-hud "dist/$STAGE/"
          # Ship the scripts + oomd drop-in users need right next to the binaries.
          cp install.sh uninstall.sh setup-zram.sh setup-hotkey.sh \
             install-extension.sh rtux.service 50-pressured-oomd.conf \
             dev.pressured.Hud.desktop "dist/$STAGE/"
          tar -czf "dist/${STAGE}.tar.gz" -C dist "$STAGE"
          (cd dist && sha256sum "${STAGE}.tar.gz" > SHA256SUMS)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            Prebuilt x86_64 Linux binaries, built on Ubuntu (glibc + libadwaita
            ≥ 1.5). On older distros, build from source — see the README.
